<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="1758192994946.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>8ページメモ帳（分割入力・固定版）</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .controls { background: #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; flex-shrink: 0; }
        .row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        select, .btn { padding: 8px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; }
        .color-btn { width: 35px; height: 35px; border: 2px solid #fff; border-radius: 4px; cursor: pointer; }
        .active-color { border: 3px solid #333 !important; }
        .mode-btn { font-weight: bold; }
        .active-draw { background: #FF9800 !important; color: white; }
        .active-erase { background: #f44336 !important; color: white; }

        .page { background: white; border: 2px solid #333; border-radius: 8px; flex-grow: 1; position: relative; display: none; overflow: hidden; touch-action: none; }
        .active { display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 10px; box-sizing: border-box; border: none; resize: none; background: transparent; font-size: 18px; line-height: 1.5; outline: none; white-space: pre-wrap; word-wrap: break-word; color: black; font-family: inherit; z-index: 1; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="row">
            <select id="pageSelect"></select>
            <button class="btn" id="prevPage">前</button>
            <button class="btn" id="nextPage">次</button>
            <button class="btn" id="clearBtn">消去</button>
        </div>
        <div class="row">
            <div id="colorPalette" style="display: flex; gap: 5px;"></div>
            <button class="btn mode-btn" id="drawMode">ペン</button>
            <button class="btn mode-btn" id="eraseMode">消しゴム</button>
        </div>
    </div>
    <div id="pagesContainer" style="flex-grow: 1; display: flex; flex-direction: column;"></div>

    <script>
        const numPages = 8;
        let currentPage = 0;
        let isDrawing = false;
        let mode = 'draw'; 
        let currentColor = '#000000';
        const colors = ['#000000', '#ff0000', '#0000ff', '#008000', '#ffa500'];
        const pages = [];

        const pageSelect = document.getElementById('pageSelect');
        const container = document.getElementById('pagesContainer');
        const colorPalette = document.getElementById('colorPalette');

        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if(color === currentColor) btn.classList.add('active-color');
            btn.onclick = () => {
                currentColor = color;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active-color'));
                btn.classList.add('active-color');
                setMode('draw');
            };
            colorPalette.appendChild(btn);
        });

        for (let i = 0; i < numPages; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `ページ ${i + 1}`;
            pageSelect.appendChild(opt);

            const pageDiv = document.createElement('div');
            pageDiv.className = 'page' + (i === 0 ? ' active' : '');
            
            const canvas = document.createElement('canvas');
            const textarea = document.createElement('textarea');
            textarea.className = 'text-layer';
            textarea.maxLength = 500;

            pageDiv.appendChild(canvas);
            pageDiv.appendChild(textarea);
            container.appendChild(pageDiv);

            const ctx = canvas.getContext('2d');
            pages.push({ div: pageDiv, canvas, ctx, textarea });

            const savedText = localStorage.getItem(`memo_text_${i}`);
            if (savedText) textarea.value = savedText;
            textarea.oninput = () => localStorage.setItem(`memo_text_${i}`, textarea.value);

            const savedDrawing = localStorage.getItem(`memo_draw_${i}`);
            if (savedDrawing) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = savedDrawing;
            }

            setupCanvas(i);
        }

        function setupCanvas(index) {
            const { canvas, ctx } = pages[index];
            function resize() {
                const temp = canvas.toDataURL();
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = temp;
            }
            window.addEventListener('resize', resize);
            setTimeout(resize, 100);

            canvas.addEventListener('touchstart', e => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            });
            canvas.addEventListener('touchmove', e => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineWidth = mode === 'draw' ? 3 : 20;
                ctx.lineCap = 'round';
                ctx.strokeStyle = mode === 'draw' ? currentColor : '#ffffff';
                ctx.globalCompositeOperation = mode === 'draw' ? 'source-over' : 'destination-out';
                ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => {
                isDrawing = false;
                localStorage.setItem(`memo_draw_${index}`, canvas.toDataURL());
            });
        }

        function setPage(index) {
            pages[currentPage].div.classList.remove('active');
            currentPage = parseInt(index);
            pages[currentPage].div.classList.add('active');
            pageSelect.value = currentPage;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('drawMode').classList.toggle('active-draw', mode === 'draw');
            document.getElementById('eraseMode').classList.toggle('active-erase', mode === 'erase');
        }

        pageSelect.onchange = e => setPage(e.target.value);
        document.getElementById('prevPage').onclick = () => setPage((currentPage - 1 + numPages) % numPages);
        document.getElementById('nextPage').onclick = () => setPage((currentPage + 1) % numPages);
        document.getElementById('drawMode').onclick = () => setMode('draw');
        document.getElementById('eraseMode').onclick = () => setMode('erase');
        document.getElementById('clearBtn').onclick = () => {
            if (confirm('このページを完全に消去しますか？')) {
                pages[currentPage].ctx.clearRect(0, 0, pages[currentPage].canvas.width, pages[currentPage].canvas.height);
                pages[currentPage].textarea.value = '';
                localStorage.removeItem(`memo_draw_${currentPage}`);
                localStorage.removeItem(`memo_text_${currentPage}`);
            }
        };

        setMode('draw');
    </script>
</body>
</html>
